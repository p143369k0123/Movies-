<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My movies</title>
    <style>
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
      }

      body{
        background:#050505;
        color:#fff;
      }

      header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:15px 20px;
        background:#050505;
        border-bottom:1px solid #222;
        position:sticky;
        top:0;
        z-index:1000;
        flex-wrap:wrap;
        gap:10px;
      }

      .left-header{
        display:flex;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
      }

      /* Logo: Highlighted with Off-White and subtle glow */
      .logo{
        font-size:22px;
        font-weight:bold;
        color:#F5F5F5; /* Off-White */
        text-shadow: 0 0 10px rgba(245, 245, 245, 0.3); /* Subtle Highlight */
      }

      /* Search Box: Off-White and Transparent */
      #searchBox{
        width:260px;
        padding:12px;
        border:1px solid rgba(245, 245, 245, 0.3);
        border-radius:10px;
        background:rgba(245, 245, 245, 0.15); /* Off-white Transparent */
        color:#fff;
        outline:none;
      }
      
      #searchBox::placeholder {
        color: rgba(255, 255, 255, 0.6);
      }

      /* Search Button: Off-Yellow */
      #searchBtn{
        padding:12px 18px;
        border:none;
        border-radius:10px;
        background:#E6C200; /* Off-Yellow */
        color:#000;
        font-weight:bold;
        cursor:pointer;
        transition: background 0.2s;
      }
      
      #searchBtn:hover {
        background: #CCAC00;
      }

      .right-header{
        display:flex;
        gap:10px;
        align-items:center;
      }

      /* Contact Button: Off-Green */
      .whatsapp-btn{
        background:#1EAA53; /* Off-Green */
        color:#fff;
        text-decoration:none;
        padding:12px 18px;
        border-radius:50px;
        font-weight:bold;
        transition: background 0.2s;
      }
      
      .whatsapp-btn:hover {
        background: #188942;
      }

      /* Admin Panel Button: Off-Yellow */
      .admin-btn{
        background:#E6C200; /* Off-Yellow */
        color:#000;
        text-decoration:none;
        padding:12px 18px;
        border-radius:50px;
        font-weight:bold;
        transition: background 0.2s;
      }
      
      .admin-btn:hover {
        background: #CCAC00;
      }

      .hero{
        height:420px;
        background:url('https://i.postimg.cc/zBRPzPrf/Chat-GPT-Image-Jun-24-2026-03-21-23-AM.png') center center/cover no-repeat;
        position:relative;
        display:flex;
        align-items:center;
        justify-content:center;
        overflow:hidden;
      }

      .hero::before{
        content:'';
        position:absolute;
        inset:0;
        background:rgba(0,0,0,.55);
        backdrop-filter:blur(3px);
      }

      .hero-content{
        position:relative;
        z-index:2;
        text-align:center;
      }

      .hero-content h1{
        font-size:60px;
        margin-bottom:10px;
      }

      .hero-content p{
        color:#ddd;
      }

      /* Main Grid Structure */
      .gallery{
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
        gap:20px;
        padding:20px;
      }

      /* IMDb Style Card View Design Fixes */
      .card{
        background:#1a1a1a;
        border-radius:12px;
        overflow:hidden;
        transition:.3s;
        border: 1px solid #252525;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .card:hover{
        transform:translateY(-5px);
        border-color: #E6C200;
        box-shadow: 0 4px 15px rgba(230, 194, 0, 0.2);
      }

      .card-img-wrapper {
        width: 100%;
        height: 260px;
        overflow: hidden;
        position: relative;
      }

      .card img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
        cursor:pointer;
        transition: transform 0.3s;
      }

      .card:hover .card-img-wrapper img {
        transform: scale(1.04);
      }

      /* IMDb Ribbon Plus Icon on Grid Box Image */
      .imdb-plus-icon {
        position: absolute;
        top: 0;
        left: 0;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        width: 32px;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: bold;
        clip-path: polygon(0 0, 100% 0, 100% 85%, 50% 100%, 0 85%);
        z-index: 10;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
      }

      .card:hover .imdb-plus-icon {
        background: rgba(245, 197, 24, 0.9);
        color: #000;
      }

      .card-details {
        padding: 12px;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        justify-content: space-between;
      }

      .card h3{
        font-size:15px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: auto;
        font-size: 13px;
      }

      .card-rating {
        color: #F5C518;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 3px;
      }

      .card-reactions {
        display: flex;
        gap: 10px;
      }

      /* Like Color: Off-Yellow Style */
      .like-counter {
        color: #E6C200;
        font-weight: 500;
      }

      /* Dislike Color: Soft, Dim, Less Bright and Subtle Halka Color */
      .dislike-counter {
        color: #777777;
        font-weight: normal;
      }

      .pagination-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        padding: 40px 16px;
      }

      .page-btn {
        padding: 12px 25px;
        border: none;
        border-radius: 10px;
        background: #f5f5f5; /* Off-white color */
        color: #000;
        font-weight: bold;
        cursor: pointer;
        font-size: 15px;
        transition: background 0.2s, opacity 0.2s;
        display: inline-block;
      }

      .page-btn:hover {
        background: #e0e0e0;
      }

      .page-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      #lightbox{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.92);
        z-index:9999;
        justify-content:center;
        align-items:center;
        backdrop-filter:blur(5px);
        padding: 20px;
      }

      .lightbox-content{
        text-align:center;
        position:relative;
        animation:zoomIn .3s ease;
        max-width: 600px;
        width: 100%;
      }

      #popupImage{
        max-width:100%;
        max-height:65vh;
        border-radius:15px;
        object-fit: contain;
        border: 1px solid #333;
      }

      .lightbox-info {
        margin-top: 12px;
        background: #111;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #222;
      }

      #popupTitle {
        font-size: 18px;
        margin-bottom: 6px;
        color: #fff;
      }

      #popupMeta {
        font-size: 14px;
        margin-bottom: 10px;
      }

      #closeLightbox{
        position:absolute;
        top:-50px;
        right:0;
        font-size:40px;
        cursor:pointer;
        color:white;
      }

      #downloadBtn{
        display:inline-block;
        padding:10px 20px;
        background:#E6C200; /* Matching Off-Yellow */
        color:#000;
        text-decoration:none;
        font-weight:bold;
        border-radius:10px;
        font-size: 14px;
      }

      @keyframes zoomIn{
        from{
          opacity:0;
          transform:scale(.8);
        }
        to{
          opacity:1;
          transform:scale(1);
        }
      }

      @media(max-width:768px){
        header{
          flex-direction:column;
          align-items:stretch;
        }
        .left-header,
        .right-header{
          width:100%;
        }
        #searchBox{
          width:100%;
        }
        .hero-content h1{
          font-size:36px;
        }
        .gallery {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          gap: 12px;
          padding: 12px;
        }
        .card-img-wrapper {
          height: 200px;
        }
        .imdb-plus-icon {
          width: 26px;
          height: 32px;
          font-size: 18px;
        }
        .card h3 {
          font-size: 13px;
          padding-bottom: 4px;
        }
        .card-meta {
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="left-header">
        <div class="logo">My movie collection</div>
        <input type="text" id="searchBox" placeholder="Search movies Title...">
        <button id="searchBtn">🔍 Search</button>
      </div>
      <div class="right-header">
        <a href="https://wa.me/7704857716" target="_blank" class="whatsapp-btn">📱 Contact</a>
        <a href="admin.html" class="admin-btn">ADMIN PANEL</a>
      </div>
    </header>
    
    <section class="hero">
      <div class="hero-content">
        <h1>My movies</h1>
        <p>Creative movies Gallery Collection</p>
        <a href="https://movies4u.pn/" target="_blank" style="display:inline-block;margin-top:15px;padding:12px 25px;background:#E6C200;color:#000;text-decoration:none;font-weight:bold;border-radius:10px;">
          Visit Movies4u
        </a>
      </div>
    </section>
    
    <div id="gallery" class="gallery"></div>
    
    <div class="pagination-container">
      <button id="prevBtn" class="page-btn" onclick="changePage(-1)">← Back</button>
      <button id="nextBtn" class="page-btn" onclick="changePage(1)">Next →</button>
    </div>
    
    <div id="lightbox">
      <div class="lightbox-content">
        <span id="closeLightbox">&times;</span>
        <img id="popupImage">
        <div class="lightbox-info">
          <h3 id="popupTitle">Movie Title</h3>
          <div id="popupMeta">
            <span style="color:#F5C518; font-weight:bold;">⭐ <span id="popupRating">7.5</span>/10</span> | 
            <span class="like-counter">👍 <span id="popupLikes">0</span></span> | 
            <span class="dislike-counter">👎 <span id="popupDislikes">0</span></span>
          </div>
          <a id="downloadBtn" download>Download Image</a>
        </div>
      </div>
    </div>

    <script>
      const DB = 'https://my-art-14983-default-rtdb.firebaseio.com/artworks.json';
      
      let allMovies = []; 
      let currentPage = 1;
      const limitPerPage = 30;
      let isSearching = false;

      async function loadGallery(){
        if(isSearching) return; 

        try{
          const response = await fetch(DB);
          const data = await response.json();

          if(!data){
            document.getElementById('gallery').innerHTML = '<h2 style="padding:20px; text-align:center; width:100%;">No Artwork Uploaded Yet</h2>';
            return;
          }

          allMovies = Object.keys(data).reverse().map(key => {
            return {
              id: key,
              title: data[key].title,
              image: data[key].image,
              likes: data[key].likes || 0,
              dislikes: data[key].dislikes || 0,
              rating: data[key].rating || '7.5'
            };
          });
          displayPage();
        }catch(error){
          console.log(error);
        }
      }

      function displayPage() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';

        const startIndex = (currentPage - 1) * limitPerPage;
        const endIndex = startIndex + limitPerPage;
        const paginatedMovies = allMovies.slice(startIndex, endIndex);

        if(paginatedMovies.length === 0 && currentPage > 1) {
          currentPage--;
          displayPage();
          return;
        }

        paginatedMovies.forEach((item, index) => {
          const globalIdx = startIndex + index;
          gallery.innerHTML += `
            <div class="card" onclick="openImage(${globalIdx})">
              <div class="card-img-wrapper">
                <div class="imdb-plus-icon">+</div>
                <img src="${item.image}" alt="${item.title}">
              </div>
              <div class="card-details">
                <h3>${item.title}</h3>
                <div class="card-meta">
                  <span class="card-rating">⭐ ${item.rating}</span>
                  <div class="card-reactions">
                    <span class="like-counter">👍 ${item.likes}</span>
                    <span class="dislike-counter">👎 ${item.dislikes}</span>
                  </div>
                </div>
              </div>
            </div>
          `;
        });

        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (endIndex >= allMovies.length);
      }

      function changePage(direction) {
        currentPage += direction;
        displayPage();
        window.scrollTo({ top: document.getElementById('gallery').offsetTop - 100, behavior: 'smooth' });
      }

      function openImage(index){
        const item = allMovies[index];
        if(!item) return;

        document.getElementById('lightbox').style.display='flex';
        document.getElementById('popupImage').src=item.image;
        document.getElementById('popupTitle').innerText=item.title;
        document.getElementById('popupRating').innerText=item.rating;
        document.getElementById('popupLikes').innerText=item.likes;
        document.getElementById('popupDislikes').innerText=item.dislikes;
        document.getElementById('downloadBtn').href=item.image;
      }

      document.getElementById('closeLightbox').onclick=function(){
        document.getElementById('lightbox').style.display='none';
      };

      document.getElementById('lightbox').onclick=function(e){
        if(e.target.id==='lightbox'){
          this.style.display='none';
        }
      };

      function searchArtwork(){
        const value = document.getElementById('searchBox').value.toLowerCase().trim();
        const gallery = document.getElementById('gallery');
        
        if(value === ''){
          isSearching = false;
          currentPage = 1;
          displayPage();
          return;
        }

        isSearching = true;
        const filtered = allMovies.filter(item => item.title.toLowerCase().includes(value));
        gallery.innerHTML = '';
        
        if(filtered.length === 0) {
          gallery.innerHTML = '<h2 style="padding:20px; text-align:center; width:100%;">No Matching Movies Found</h2>';
        } else {
          filtered.forEach(item => {
            const itemString = JSON.stringify(item).replace(/"/g, '&quot;');
            gallery.innerHTML += `
              <div class="card" onclick='openImageDirect(${itemString})'>
                <div class="card-img-wrapper">
                  <div class="imdb-plus-icon">+</div>
                  <img src="${item.image}" alt="${item.title}">
                </div>
                <div class="card-details">
                  <h3>${item.title}</h3>
                  <div class="card-meta">
                    <span class="card-rating">⭐ ${item.rating}</span>
                    <div class="card-reactions">
                      <span class="like-counter">👍 ${item.likes}</span>
                      <span class="dislike-counter">👎 ${item.dislikes}</span>
                    </div>
                  </div>
                </div>
              </div>
            `;
          });
        }

        document.getElementById('prevBtn').disabled = true;
        document.getElementById('nextBtn').disabled = true;
      }

      window.openImageDirect = function(item) {
        document.getElementById('lightbox').style.display='flex';
        document.getElementById('popupImage').src=item.image;
        document.getElementById('popupTitle').innerText=item.title;
        document.getElementById('popupRating').innerText=item.rating;
        document.getElementById('popupLikes').innerText=item.likes;
        document.getElementById('popupDislikes').innerText=item.dislikes;
        document.getElementById('downloadBtn').href=item.image;
      }

      document.getElementById('searchBtn').addEventListener('click', searchArtwork);
      document.getElementById('searchBox').addEventListener('keypress', function(e){
        if(e.key==='Enter'){
          searchArtwork();
        }
      });

      loadGallery();
      setInterval(loadGallery, 5000); 
    </script>
  </body>
</html>
