<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Canvas Admin</title>
    <style>
      body{margin:0;font-family:Arial,sans-serif;background:#050505;color:#fff;padding:12px; box-sizing: border-box;}
      .box{max-width:100%;margin:auto;background:#111;padding:16px;border-radius:12px;box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
      h2{margin-top:0;font-size:20px;text-align:center;letter-spacing:0.5px;}
      h3{margin-top:20px;font-size:16px;color:#aaa;}
      
      input,button,select{width:100%;padding:14px;margin:10px 0;border-radius:8px;border:none;box-sizing: border-box;font-size:15px;}
      input,select{background:#1c1c1e;color:#fff;border:1px solid #2c2c2e;}
      input:focus,select:focus{outline:none;border-color:#fff;}

      /* Main Layout Flex Grid for Dashboard */
      .dashboard-grid {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      @media (min-width: 768px) {
        .dashboard-grid { flex-direction: row; align-items: flex-start; }
        .main-form { flex: 1.2; }
        .banner-sidebar { flex: 0.8; }
      }

      /* Mobile Custom File Upload Styling */
      .file-input-wrapper {
        position: relative;
        margin: 10px 0;
      }
      .file-label {
        display: block;
        padding: 14px;
        background: #1c1c1e;
        border: 2px dashed #3a3a3c;
        border-radius: 8px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        color: #aaa;
        font-size: 14px;
      }
      .file-label:hover { border-color: #fff; color: #fff; }
      #imageFile { display: none; }

      /* Poster Preview */
      .preview-box { text-align: center; margin: 15px 0; display: none; }
      .poster-container {
        position: relative;
        display: inline-block;
        width: 120px;
        height: 170px;
        border-radius: 8px;
        overflow: hidden;
        border: 2px solid #fff;
        box-shadow: 0 4px 10px rgba(0,0,0,0.7);
      }
      #imgPreview { width: 100%; height: 100%; object-fit: cover; }
      .imdb-plus-icon {
        position: absolute;
        top: 0; left: 0;
        background: rgba(0, 0, 0, 0.6); color: #fff;
        width: 28px; height: 34px;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; font-weight: bold;
        clip-path: polygon(0 0, 100% 0, 100% 85%, 50% 100%, 0 85%);
      }

      /* Premium Dark/White Button Theme */
      .btn-primary { background: #ffffff; color: #000000; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
      .btn-primary:active { background: #e5e5e5; }
      .cancel-btn { background: #2c2c2e; color: #ff453a; margin-top: 5px; font-weight: bold; }
      .cancel-btn:active { background: #3a3a3c; }

      .form-row { display:flex; gap:10px; margin:10px 0; }
      .form-group { flex:1; }
      .form-group label { font-size:12px; color:#aaa; display:block; margin-bottom:4px; }

      .imdb-rating-box { background: #1c1c1e; padding: 12px; border-radius: 8px; border-left: 4px solid #ffffff; margin: 10px 0; }
      .imdb-rating-box label { color: #ffffff; font-weight: bold; font-size: 14px; }

      /* List Items customized for Mobile Layout */
      .item { display: flex; flex-direction: column; background: #1c1c1e; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #2c2c2e; }
      .item-info { margin-bottom: 10px; }
      .item-info strong { font-size: 15px; display: block; margin-bottom: 4px; }
      .item-info div { font-size: 12px; color: #aaa; margin-top: 2px; word-break: break-all; }
      .btn-group { display: flex; gap: 8px; width: 100%; }
      .edit-btn { flex: 1; background: #2c2c2e; color: #30d158; margin: 0; padding: 10px; font-size: 14px; font-weight: bold; }
      .del { flex: 1; background: #2c2c2e; color: #ff453a; margin: 0; padding: 10px; font-size: 14px; font-weight: bold; }
      
      /* --- 5 Circles Side Section Design --- */
      .banner-sidebar { background: #161618; border: 1px solid #2c2c2e; border-radius: 12px; padding: 16px; margin-top: 15px; }
      @media (min-width: 768px) { .banner-sidebar { margin-top: 0; } }
      .slots-container { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
      .slot-item { display: flex; align-items: center; justify-content: space-between; background: #1c1c1e; padding: 10px; border-radius: 8px; border: 1px solid #2c2c2e; }
      .slot-preview { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; background: #333; }
      .slot-info { flex: 1; margin-left: 12px; font-size: 14px; font-weight: bold; }
      .slot-actions { display: flex; gap: 5px; }
      .slot-btn { padding: 6px 10px; font-size: 12px; font-weight: bold; border-radius: 4px; border: none; width: auto; margin: 0; cursor: pointer; }
      .slot-up-btn { background: #30d158; color: #000; }
      .slot-del-btn { background: #ff453a; color: #fff; }
      #bannerFile { display: none; }

      #panel{display:none}
    </style>
  </head>
  <body>
    <div class="box" id="login">
      <h2>Admin Login</h2>
      <input id="pass" type="password" placeholder="Password">
      <button class="btn-primary" onclick="login()">Login</button>
    </div>
    
    <div class="box" id="panel">
      <div class="dashboard-grid">
        
        <div class="main-form" style="width: 100%;">
          <h2 id="form-title">My Canvas Dashboard</h2>
          
          <input id="title" placeholder="Movie / Artwork Title">
          <input id="targetUrl" placeholder="Movie / Stream URL (Link)">
          
          <div class="file-input-wrapper">
            <label for="imageFile" class="file-label" id="fileLabel">📁 Click to Upload Image / Poster</label>
            <input type="file" id="imageFile" accept="image/*" onchange="previewAndConvertImage(this)">
          </div>
          
          <div class="preview-box" id="previewBox">
            <div class="poster-container">
              <div class="imdb-plus-icon">+</div>
              <img id="imgPreview" src="" alt="Preview">
            </div>
            <div style="font-size:11px; color:#aaa; margin-top:4px;">Live Preview</div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="likes">👍 Likes</label>
              <input id="likes" type="number" value="0" min="0">
            </div>
            <div class="form-group">
              <label for="dislikes">👎 Dislikes</label>
              <input id="dislikes" type="number" value="0" min="0">
            </div>
          </div>
          
          <div class="imdb-rating-box">
            <label>Rating Control</label>
            <div style="display:flex; gap:10px; align-items:center; margin-top:5px;">
              <input id="rating" type="range" min="1.0" max="10.0" step="0.1" value="7.5" oninput="document.getElementById('ratingVal').innerText = this.value">
              <span style="font-weight:bold; color:#fff; min-width:40px; text-align:right;">
                <span id="ratingVal">7.5</span>/10
              </span>
            </div>
          </div>
          
          <button id="submitBtn" class="btn-primary" onclick="uploadArtwork()">Upload Movie</button>
          <button id="cancelEditBtn" class="cancel-btn" style="display:none;" onclick="resetForm()">Cancel Edit</button>
          
          <hr style="border:0; border-top:1px solid #2c2c2e; margin:20px 0;">
          <h3>Uploaded Items List</h3>
          <div id="list"></div>
        </div>

        <div class="banner-sidebar" style="width: 100%; box-sizing: border-box;">
          <h2 style="font-size:16px; border-bottom:1px solid #2c2c2e; padding-bottom:8px; text-align:left;">🔴 Circle Banners (Max 5)</h2>
          <p style="font-size:11px; color:#aaa; margin:5px 0 15px 0;">Directly updates below visit button on home page</p>
          
          <input type="file" id="bannerFile" accept="image/*" onchange="uploadBannerImage(this)">
          
          <div class="slots-container">
            <div class="slot-item">
              <img id="bp-1" class="slot-preview" src="" alt="Empty">
              <div class="slot-info">Slot 1</div>
              <div class="slot-actions">
                <button class="slot-btn slot-up-btn" onclick="triggerBannerUpload(1)">Upload</button>
                <button class="slot-btn slot-del-btn" onclick="deleteBannerSlot(1)">X</button>
              </div>
            </div>
            <div class="slot-item">
              <img id="bp-2" class="slot-preview" src="" alt="Empty">
              <div class="slot-info">Slot 2</div>
              <div class="slot-actions">
                <button class="slot-btn slot-up-btn" onclick="triggerBannerUpload(2)">Upload</button>
                <button class="slot-btn slot-del-btn" onclick="deleteBannerSlot(2)">X</button>
              </div>
            </div>
            <div class="slot-item">
              <img id="bp-3" class="slot-preview" src="" alt="Empty">
              <div class="slot-info">Slot 3</div>
              <div class="slot-actions">
                <button class="slot-btn slot-up-btn" onclick="triggerBannerUpload(3)">Upload</button>
                <button class="slot-btn slot-del-btn" onclick="deleteBannerSlot(3)">X</button>
              </div>
            </div>
            <div class="slot-item">
              <img id="bp-4" class="slot-preview" src="" alt="Empty">
              <div class="slot-info">Slot 4</div>
              <div class="slot-actions">
                <button class="slot-btn slot-up-btn" onclick="triggerBannerUpload(4)">Upload</button>
                <button class="slot-btn slot-del-btn" onclick="deleteBannerSlot(4)">X</button>
              </div>
            </div>
            <div class="slot-item">
              <img id="bp-5" class="slot-preview" src="" alt="Empty">
              <div class="slot-info">Slot 5</div>
              <div class="slot-actions">
                <button class="slot-btn slot-up-btn" onclick="triggerBannerUpload(5)">Upload</button>
                <button class="slot-btn slot-del-btn" onclick="deleteBannerSlot(5)">X</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script>
      const PASSWORD='oo00.in';
      const DB='https://my-art-14983-default-rtdb.firebaseio.com/artworks';
      const BANNER_DB='https://my-art-14983-default-rtdb.firebaseio.com/banners';

      let editMode = false;
      let editId = null;
      let globalBase64Image = ""; 
      let activeBannerSlot = null;

      function login(){
        if(document.getElementById('pass').value===PASSWORD){
          document.getElementById('login').style.display='none';
          document.getElementById('panel').style.display='block';
          loadArtworks();
          loadBanners();
        } else alert('Wrong Password');
      }

      function previewAndConvertImage(input) {
        const file = input.files[0];
        if (file) {
          if(file.size > 1500000) { 
            alert("Image size bada hai! 1.5MB se choti image use karein.");
            return;
          }
          const reader = new FileReader();
          reader.onload = function(e) {
            globalBase64Image = e.target.result;
            document.getElementById('imgPreview').src = e.target.result;
            document.getElementById('previewBox').style.display = "block";
            document.getElementById('fileLabel').innerText = "✅ " + file.name;
          };
          reader.readAsDataURL(file);
        }
      }

      /* Banner Logic Scripts */
      function triggerBannerUpload(slotId) {
        activeBannerSlot = slotId;
        document.getElementById('bannerFile').click();
      }

      async function uploadBannerImage(input) {
        const file = input.files[0];
        if (file && activeBannerSlot) {
          if(file.size > 1000000) { 
            alert("Banner Image size 1MB se kam hona chahiye!");
            return;
          }
          const reader = new FileReader();
          reader.onload = async function(e) {
            const base64Data = e.target.result;
            try {
              await fetch(`${BANNER_DB}/slot_${activeBannerSlot}.json`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ image: base64Data })
              });
              alert(`Slot ${activeBannerSlot} Updated Successfully!`);
              loadBanners();
            } catch(err) {
              alert("Error updating banner.");
            }
          };
          reader.readAsDataURL(file);
        }
      }

      async function deleteBannerSlot(slotId) {
        if(confirm(`Kya aap Slot ${slotId} ki image hatana chahte hain?`)) {
          try {
            await fetch(`${BANNER_DB}/slot_${slotId}.json`, { method: 'DELETE' });
            loadBanners();
          } catch(err) {
            alert("Error deleting slot.");
          }
        }
      }

      async function loadBanners() {
        try {
          const r = await fetch(BANNER_DB + '.json');
          const data = await r.json() || {};
          for(let i=1; i<=5; i++) {
            const slotData = data[`slot_${i}`];
            const imgEl = document.getElementById(`bp-${i}`);
            if(slotData && slotData.image) {
              imgEl.src = slotData.image;
              imgEl.style.border = "2px solid #30d158";
            } else {
              imgEl.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50'><rect width='50' height='50' fill='%23222'/></svg>";
              imgEl.style.border = "2px dashed #444";
            }
          }
        } catch(e) { console.error("Error loading banners dashboard", e); }
      }

      async function uploadArtwork(){
        const title=document.getElementById('title').value.trim();
        const url=document.getElementById('targetUrl').value.trim();
        const likes=parseInt(document.getElementById('likes').value) || 0;
        const dislikes=parseInt(document.getElementById('dislikes').value) || 0;
        const rating=parseFloat(document.getElementById('rating').value) || 7.5;

        if(!title) { alert('Please enter Movie Title'); return; }
        if(!url) { alert('Please enter Movie/Stream URL Link'); return; }
        if(!globalBase64Image) { alert('Please upload an Image first!'); return; }

        const payload = {
          title, url, image: globalBase64Image, likes, dislikes, rating, createdAt: Date.now()
        };

        document.getElementById('submitBtn').innerText = "Processing...";
        document.getElementById('submitBtn').disabled = true;

        try {
          if(editMode && editId) {
            await fetch(`${DB}/${editId}.json`, {
              method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            alert('Updated successfully!');
          } else {
            await fetch(DB+'.json',{
              method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
            });
            alert('Uploaded successfully!');
          }
          resetForm();
          loadArtworks();
        } catch(error) {
          console.error(error);
          alert("Connection Error!");
        } finally {
          document.getElementById('submitBtn').disabled = false;
        }
      }

      function startEdit(id, title, url, image, likes, dislikes, rating) {
        editMode = true; editId = id; globalBase64Image = image; 
        document.getElementById('form-title').innerText = "Edit Movie Mode";
        document.getElementById('title').value = title;
        document.getElementById('targetUrl').value = url || '';
        document.getElementById('likes').value = likes;
        document.getElementById('dislikes').value = dislikes;
        document.getElementById('rating').value = rating;
        document.getElementById('ratingVal').innerText = rating;
        document.getElementById('imgPreview').src = image;
        document.getElementById('previewBox').style.display = "block";
        document.getElementById('fileLabel').innerText = "🔄 Change Image (Optional)";
        document.getElementById('submitBtn').innerText = "Update Movie";
        document.getElementById('cancelEditBtn').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
      }

      function resetForm() {
        editMode = false; editId = null; globalBase64Image = "";
        document.getElementById('form-title').innerText = "My Canvas Dashboard";
        document.getElementById('title').value = ''; document.getElementById('targetUrl').value = '';
        document.getElementById('imageFile').value = ''; 
        document.getElementById('fileLabel').innerText = "📁 Click to Upload Image / Poster";
        document.getElementById('previewBox').style.display = "none"; document.getElementById('imgPreview').src = "";
        document.getElementById('likes').value = '0'; document.getElementById('dislikes').value = '0';
        document.getElementById('rating').value = '7.5'; document.getElementById('ratingVal').innerText = '7.5';
        document.getElementById('submitBtn').innerText = "Upload Movie";
        document.getElementById('cancelEditBtn').style.display = "none";
      }

      async function loadArtworks(){
        try {
          const r=await fetch(DB+'.json'); const d=await r.json();
          const list=document.getElementById('list'); list.innerHTML='';
          if(!d) { list.innerHTML = '<div style="color:#666; padding:10px;">No items found.</div>'; return; }
          
          Object.keys(d).reverse().forEach(k=>{
            const item = d[k];
            const currentLikes = item.likes || 0; const currentDislikes = item.dislikes || 0;
            const currentRating = item.rating || '7.5'; const currentUrl = item.url || '#';
            
            const itemHtml = `
              <div class="item">
                <div class="item-info">
                  <strong>${item.title}</strong>
                  <div>🔗 Link: ${currentUrl}</div>
                  <div>⭐ ${currentRating} | 👍 ${currentLikes} | 👎 ${currentDislikes}</div>
                </div>
                <div class="btn-group">
                  <button class="edit-btn" id="ed-${k}">Edit</button>
                  <button class="del" onclick="delArt('${k}')">Delete</button>
                </div>
              </div>`;
            list.insertAdjacentHTML('beforeend', itemHtml);
            document.getElementById(`ed-${k}`).onclick = function() {
              startEdit(k, item.title, item.url, item.image, currentLikes, currentDislikes, currentRating);
            };
          });
        } catch (err) { console.error("Error loading data: ", err); }
      }

      async function delArt(id){
        if(confirm('Are you sure you want to delete this item?')) {
          await fetch(DB+'/'+id+'.json',{method:'DELETE'});
          if(editId === id) resetForm();
          loadArtworks();
        }
      }
    </script>
  </body>
</html>
